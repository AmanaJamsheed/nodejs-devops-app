name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: amanajamsheed/nodejs-devops-app

jobs:

  # ── Job 1: Run Tests ────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    # Spin up MongoDB as a service container (no manual setup needed)
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/devopsdb_test
        run: npm test

  # ── Job 2: Build & Push Docker Image ───────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build Docker image
        run: docker build -t $IMAGE_NAME:latest .

      - name: 🚀 Push image to Docker Hub
        run: docker push $IMAGE_NAME:latest

      - name: ✅ Done
        run: echo "Image pushed → docker pull $IMAGE_NAME:latest"
