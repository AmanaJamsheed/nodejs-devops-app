name: CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ─────────────────────────────────────────────────────────────────────────────
# Environment variables shared across jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  IMAGE_NAME: amanajamsheed/nodejs-devops-app
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: Run Tests
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🐳 Start MongoDB for tests
        run: |
          docker run -d \
            --name mongodb-test \
            -p 27017:27017 \
            -e MONGO_INITDB_DATABASE=devopsdb_test \
            mongo:7.0
          # Wait for MongoDB to be ready
          echo "Waiting for MongoDB to be ready..."
          for i in {1..30}; do
            if docker exec mongodb-test mongosh --eval "db.adminCommand('ping')" --quiet 2>/dev/null; then
              echo "✅ MongoDB is ready!"
              break
            fi
            echo "Attempt $i: MongoDB not ready yet, waiting..."
            sleep 2
          done

      - name: 🧪 Run unit tests
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/devopsdb_test
        run: npm test

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: 🛑 Stop MongoDB container
        if: always()
        run: docker stop mongodb-test && docker rm mongodb-test

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: Build & Push Docker Image to Docker Hub
  # ══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: test                # Only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Image pushed successfully
        run: |
          echo "🎉 Docker image pushed:"
          echo "${{ steps.meta.outputs.tags }}"

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3: Deploy to VM via SSH
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push      # Only runs after image is pushed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📤 Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.VM_USERNAME }}/nodejs-devops-app/"

      - name: 🚀 SSH into VM and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.VM_USERNAME }}/nodejs-devops-app

            echo "🔐 Logging in to Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "📥 Pulling latest image..."
            docker pull amanajamsheed/nodejs-devops-app:latest

            echo "🔄 Stopping old containers..."
            docker compose down --remove-orphans || true

            echo "🚀 Starting updated containers..."
            docker compose up -d

            echo "🩺 Waiting for health check..."
            sleep 15
            curl -f http://localhost:3000/health || (echo "❌ Health check failed!" && exit 1)

            echo "✅ Deployment successful!"
            docker ps --filter "name=nodejs"
